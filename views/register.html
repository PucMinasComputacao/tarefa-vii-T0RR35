<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styleLogin.css">
</head>

<body>
    <header>
        <a href="index.html"><img src="../../../images/logoCompleta.png" class="logo"></a>
    </header>

    <main class="d-flex align-items-center justify-content-center mt-5">
        <div class="container mt-5 col-md-4">
            <div class="card p-4 shadow-sm">
                <h2 class=" text-center mb-4 text-dark-green">Cadastro</h2>
                <form action="index.html" method="GET">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="nome"
                            name="nome" placeholder="Nome completo" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control"
                            id="email" name="email" placeholder="Email" required>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" placeholder="Senha"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="confirmar_senha" class="form-label">Confirmar Senha</label>
                        <input type="password" class="form-control" id="confirmar_senha" name="confirmar_senha"
                            placeholder="Confirmar senha" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Cadastrar</button>
                    <p class="mt-3 text-center">Já tem uma conta? <a href="login.html">Faça Login</a></p>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white pt-3 pb-2 mt-5">
        <div class="container text-center text-md-start">
            <div class="row text-center text-md-start">

                <div class="text-center mx-auto mt-3">
                    <h5 class="text-uppercase mb-4 fw-bold text-warning">Roamazing</h5>
                    <p>Explore o planeta de um jeito único — destinos incríveis, experiências inesquecíveis. 🌎</p>
                </div>

            </div>
            <hr class="mb-4">
            <div class="text-center">
                <p>Desenvolvido com Bootstrap &copy; 2026. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</body>

</html>
